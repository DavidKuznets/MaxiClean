steps:
  # Build the backend
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/maxiclean-backend:latest"
      - "-f"
      - "backend/Dockerfile"
      - "."

  # Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/maxiclean-backend:latest"

  # Deploy to App Engine
  - name: "gcr.io/cloud-builders/appengine-python"
    args: ["deploy", "backend/app.yaml"]
    env: ["CLOUDSDK_APPENGINE_ENVIRONMENT=standard"]

  # Build frontend
  - name: "gcr.io/cloud-builders/npm"
    args: ["--prefix", "frontend", "install"]

  - name: "gcr.io/cloud-builders/npm"
    args: ["--prefix", "frontend", "run", "build"]

  # Upload frontend to Cloud Storage
  - name: "gcr.io/cloud-builders/gke-deploy"
    args:
      - run
      - --filename=frontend/dist
      - --image=gcr.io/$PROJECT_ID/maxiclean-frontend
      - --location=us-central1
      - --cluster=maxiclean-cluster

timeout: "3600s"
images:
  - "gcr.io/$PROJECT_ID/maxiclean-backend:latest"
