services:
  frontend:
    container_name: frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
#    env_file:
#      - .env
    networks:
      - maxiclean_net

  # Backend (Django + SQLite)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    networks:
      - maxiclean_net

networks:
  maxiclean_net: